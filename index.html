<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 콘텐츠 분석기</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <div class="container">
    <h1>유튜브 콘텐츠 분석기</h1>
    <p class="subtitle">
      확장 프로그램에서 가져온 영상 정보와 대본을 바탕으로 콘텐츠를 분석합니다.
    </p>

    <div id="noDataMessage" class="notice">
      확장 프로그램에서 영상을 보내면 이곳에 분석 화면이 표시됩니다.
    </div>

    <div id="extensionResult" class="video-card">
      <h2>가져온 영상 정보</h2>

      <img id="extensionThumbnail" class="thumbnail" src="" alt="유튜브 썸네일">

      <div class="video-info">
        <div>
          <strong>영상 제목</strong>
          <p id="extensionTitle"></p>
        </div>

        <div>
          <strong>채널명</strong>
          <p id="extensionChannel"></p>
        </div>

        <div>
          <strong>영상 주소</strong>
          <p id="extensionUrl"></p>
        </div>
      </div>
    </div>

    <div id="scriptSection" class="script-section">
      <h2>대본 입력</h2>
      <p class="guide">
        유튜브 대본을 붙여넣으면 시간코드를 제거하고 분석용 텍스트로 정리할 수 있습니다.
      </p>

      <textarea 
        id="rawScript" 
        placeholder="여기에 유튜브 대본을 붙여넣으세요. 예: 0:00 오늘은... 0:05 다음으로..."
      ></textarea>

      <div class="button-group">
        <button onclick="cleanScript()">대본 정리하기</button>
        <button onclick="copyCleanScript()">정리된 대본 복사</button>
        <button onclick="downloadCleanScript()">TXT 다운로드</button>
      </div>

      <h2>정리된 대본</h2>
      <textarea 
        id="cleanedScript" 
        placeholder="정리된 대본이 여기에 표시됩니다."
        readonly
      ></textarea>
    </div>

    <div id="analysisSection" class="analysis-section">
      <h2>분석 도구</h2>
      <p class="guide">
        아래 버튼을 누르면 대본을 바탕으로 콘텐츠 분석용 프롬프트가 생성됩니다.
      </p>

      <div class="button-group">
        <button onclick="makeSummaryPrompt()">요약 프롬프트 생성</button>
        <button onclick="makeShortsPrompt()">쇼츠 소재 프롬프트 생성</button>
        <button onclick="makeTitlePrompt()">제목 추천 프롬프트 생성</button>
        <button onclick="makeThumbnailPrompt()">썸네일 문구 프롬프트 생성</button>
      </div>

      <h2>생성된 프롬프트</h2>
      <textarea 
        id="promptResult" 
        placeholder="생성된 프롬프트가 여기에 표시됩니다."
        readonly
      ></textarea>

      <div class="button-group">
        <button onclick="copyPrompt()">프롬프트 복사</button>
        <button onclick="downloadAnalysis()">분석 자료 다운로드</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
